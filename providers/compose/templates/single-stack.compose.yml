# Single-box (non-Swarm) Kutab deployment. Run via single-deploy.sh, which
# generates the env files + a .env with the interpolated values below.
# Brings its own Traefik (TLS via Let's Encrypt) so one VM serves a full tenant.
name: kutab-${TENANT_NAME}

x-app-env: &app-env
  env_file:
    - ${KUTAB_ENV_DIR}/backend.env

services:
  traefik:
    image: traefik:v3.1
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/acme/acme.json
      - --certificatesresolvers.le.acme.tlschallenge=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-acme:/acme
    networks: [kutab]
    restart: unless-stopped

  mysql:
    image: ${SINGLE_DB_IMAGE:-mysql:8.4.8}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --mysql-native-password=ON
      - --innodb-buffer-pool-size=${DB_BUFFER_POOL:-512M}
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    networks: [kutab]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12

  valkey:
    image: valkey/valkey:7.2.12-alpine
    <<: *app-env
    command: ["/bin/sh", "-lc", "exec valkey-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    volumes:
      - valkey-data:/data
    networks: [kutab]
    restart: unless-stopped

  backend:
    image: ${BACKEND_IMAGE}
    <<: *app-env
    environment:
      CONTAINER_MODE: fpm
      RUNNING_MIGRATIONS_AND_SEEDERS: "false"
    networks:
      kutab:
        aliases: [app]
    volumes:
      - backend-storage:/var/www/html/storage/app/public
      - backend-logs:/var/www/html/storage/logs
    depends_on: [mysql, valkey]
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "${KUTAB_APP_CPU_LIMIT:-1.0}", memory: "${KUTAB_APP_MEM_LIMIT:-768M}" }

  nginx:
    image: ${NGINX_IMAGE}
    <<: *app-env
    networks: [kutab]
    volumes:
      - backend-storage:/var/www/html/storage/app/public:ro
    depends_on: [backend]
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${TENANT_NAME}-api.rule=${API_HOST_RULE}"
      - "traefik.http.routers.${TENANT_NAME}-api.entrypoints=websecure"
      - "traefik.http.routers.${TENANT_NAME}-api.tls.certresolver=le"
      - "traefik.http.services.${TENANT_NAME}-api.loadbalancer.server.port=8080"

  frontend:
    image: ${FRONTEND_IMAGE}
    env_file:
      - ${KUTAB_ENV_DIR}/frontend.env
    networks: [kutab]
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${TENANT_NAME}-fe.rule=${FRONTEND_HOST_RULE}"
      - "traefik.http.routers.${TENANT_NAME}-fe.entrypoints=websecure"
      - "traefik.http.routers.${TENANT_NAME}-fe.tls.certresolver=le"
      - "traefik.http.services.${TENANT_NAME}-fe.loadbalancer.server.port=3000"

  reverb:
    image: ${BACKEND_IMAGE}
    <<: *app-env
    environment:
      CONTAINER_MODE: reverb
    networks: [kutab]
    depends_on: [backend]
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${TENANT_NAME}-ws.rule=${WS_HOST_RULE}"
      - "traefik.http.routers.${TENANT_NAME}-ws.entrypoints=websecure"
      - "traefik.http.routers.${TENANT_NAME}-ws.tls.certresolver=le"
      - "traefik.http.services.${TENANT_NAME}-ws.loadbalancer.server.port=6001"

  worker:
    image: ${BACKEND_IMAGE}
    <<: *app-env
    environment:
      CONTAINER_MODE: worker
      WORKER_COMMAND: php artisan queue:work --queue=default --sleep=3 --tries=3 --max-time=3600
    volumes:
      - backend-storage:/var/www/html/storage/app/public
      - backend-logs:/var/www/html/storage/logs
    depends_on: [backend]
    restart: unless-stopped

  worker-notifications:
    image: ${BACKEND_IMAGE}
    <<: *app-env
    environment:
      CONTAINER_MODE: worker
      WORKER_COMMAND: php artisan queue:work --queue=notifications --sleep=3 --tries=3 --max-time=3600
    volumes:
      - backend-storage:/var/www/html/storage/app/public
      - backend-logs:/var/www/html/storage/logs
    depends_on: [backend]
    restart: unless-stopped

  scheduler:
    image: ${BACKEND_IMAGE}
    <<: *app-env
    environment:
      CONTAINER_MODE: scheduler
    volumes:
      - backend-storage:/var/www/html/storage/app/public
      - backend-logs:/var/www/html/storage/logs
    depends_on: [backend]
    restart: unless-stopped

  # Optional WhatsApp gateway — enable with: --profile whatsapp
  whatsapp:
    image: ${WHATSAPP_IMAGE:-avoylenko/wwebjs-api:latest}
    profiles: [whatsapp]
    environment:
      BASE_WEBHOOK_URL: ""
    volumes:
      - whatsapp-sessions:/usr/src/app/sessions
    networks: [kutab]
    restart: unless-stopped

networks:
  kutab:
    driver: bridge

volumes:
  mysql-data:
  valkey-data:
  backend-storage:
  backend-logs:
  traefik-acme:
  whatsapp-sessions:
