version: "3.9"

services:
  traefik:
    image: traefik:v3.7.5
    command:
      - "--api.dashboard=true"
      - "--providers.swarm=true"
      - "--providers.swarm.endpoint=unix:///var/run/docker.sock"
      - "--providers.swarm.exposedbydefault=false"
      - "--providers.swarm.network=kutab-shared"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.entrypoint=metrics"
      - "--entrypoints.metrics.address=:8082"
      - "--accesslog=true"
      - "--log.level=INFO"
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt
      - ${CONFIG_ROOT}/traefik/dynamic:/etc/traefik/dynamic:ro
      - ${CONFIG_ROOT}/traefik/auth:/etc/traefik/auth:ro
    networks:
      - kutab-shared
    deploy:
      mode: global
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.traefik.rule=Host(`traefik.${CLUSTER_DOMAIN}`)"
        - "traefik.http.routers.traefik.entrypoints=websecure"
        - "traefik.http.routers.traefik.tls=true"
        - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
        - "traefik.http.routers.traefik.service=api@internal"
        - "traefik.http.routers.traefik.middlewares=traefik-auth,security-headers@file"
        - "traefik.http.middlewares.traefik-auth.basicauth.usersfile=/etc/traefik/auth/traefik.htpasswd"
        - "traefik.http.services.traefik.loadbalancer.server.port=8080"

  portainer:
    image: portainer/portainer-ce:2.39.1
    command:
      - -H
      - unix:///var/run/docker.sock
      - --admin-password-file
      - /run/secrets/portainer_admin_password
      - --trusted-origins
      - portainer.${CLUSTER_DOMAIN}
    secrets:
      - portainer_admin_password
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer-data:/data
    networks:
      - kutab-shared
    deploy:
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.portainer.rule=Host(`portainer.${CLUSTER_DOMAIN}`)"
        - "traefik.http.routers.portainer.entrypoints=websecure"
        - "traefik.http.routers.portainer.tls=true"
        - "traefik.http.routers.portainer.tls.certresolver=letsencrypt"
        - "traefik.http.routers.portainer.middlewares=security-headers@file"
        - "traefik.http.services.portainer.loadbalancer.server.port=9000"

  prometheus:
    image: prom/prometheus:v3.11.2
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ${CONFIG_ROOT}/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${CONFIG_ROOT}/prometheus/rules:/etc/prometheus/rules:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - prometheus-data:/prometheus
    networks:
      - kutab-shared
    deploy:
      placement:
        constraints:
          - node.labels.kutab.monitoring == true
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.prometheus.rule=Host(`prometheus.${CLUSTER_DOMAIN}`)"
        - "traefik.http.routers.prometheus.entrypoints=websecure"
        - "traefik.http.routers.prometheus.tls=true"
        - "traefik.http.routers.prometheus.tls.certresolver=letsencrypt"
        - "traefik.http.routers.prometheus.middlewares=prometheus-auth,security-headers@file"
        - "traefik.http.middlewares.prometheus-auth.basicauth.usersfile=/etc/traefik/auth/prometheus.htpasswd"
        - "traefik.http.services.prometheus.loadbalancer.server.port=9090"

  alertmanager:
    image: prom/alertmanager:v0.28.1
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ${CONFIG_ROOT}/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    networks:
      - kutab-shared
    deploy:
      placement:
        constraints:
          - node.labels.kutab.monitoring == true
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.alertmanager.rule=Host(`alertmanager.${CLUSTER_DOMAIN}`)"
        - "traefik.http.routers.alertmanager.entrypoints=websecure"
        - "traefik.http.routers.alertmanager.tls=true"
        - "traefik.http.routers.alertmanager.tls.certresolver=letsencrypt"
        - "traefik.http.routers.alertmanager.middlewares=prometheus-auth,security-headers@file"
        - "traefik.http.services.alertmanager.loadbalancer.server.port=9093"

  grafana:
    image: grafana/grafana:13.0.1
    environment:
      GF_SECURITY_ADMIN_USER__FILE: /run/secrets/grafana_admin_user
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_SERVER_ROOT_URL: https://grafana.${CLUSTER_DOMAIN}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
    secrets:
      - grafana_admin_user
      - grafana_admin_password
    volumes:
      - grafana-data:/var/lib/grafana
      - ${CONFIG_ROOT}/grafana/provisioning:/etc/grafana/provisioning:ro
      - ${CONFIG_ROOT}/grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - kutab-shared
    deploy:
      placement:
        constraints:
          - node.labels.kutab.monitoring == true
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.grafana.rule=Host(`grafana.${CLUSTER_DOMAIN}`)"
        - "traefik.http.routers.grafana.entrypoints=websecure"
        - "traefik.http.routers.grafana.tls=true"
        - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
        - "traefik.http.routers.grafana.middlewares=security-headers@file"
        - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  loki:
    image: grafana/loki:3.6.8
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ${CONFIG_ROOT}/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    networks:
      - kutab-shared
    deploy:
      placement:
        constraints:
          - node.labels.kutab.monitoring == true

  promtail:
    image: grafana/promtail:3.6.8
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ${CONFIG_ROOT}/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - kutab-shared
    deploy:
      mode: global

  node-exporter:
    image: prom/node-exporter:v1.11.1
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - kutab-shared
    deploy:
      mode: global

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.54.1
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    networks:
      - kutab-shared
    deploy:
      mode: global

networks:
  kutab-shared:
    external: true

volumes:
  traefik-certs:
  portainer-data:
  prometheus-data:
  alertmanager-data:
  grafana-data:
  loki-data:

secrets:
  grafana_admin_user:
    external: true
  grafana_admin_password:
    external: true
  portainer_admin_password:
    external: true
